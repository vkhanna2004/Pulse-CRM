syntax = "proto3";
package pulsecrm.deals.v1;
option csharp_namespace = "PulseCRM.Shared.Proto.Deals";
import "google/protobuf/timestamp.proto";

service DealsInternalService {
  rpc GetDealContext (GetDealRequest) returns (DealContextResponse);
  rpc GetDealTimeline (GetTimelineRequest) returns (TimelineResponse);
  rpc GetDealSnapshot (GetDealRequest) returns (DealSnapshot);
}

message GetDealRequest {
  string tenant_id = 1;
  string deal_id = 2;
}

message GetTimelineRequest {
  string tenant_id = 1;
  string deal_id = 2;
  google.protobuf.Timestamp since = 3;
  int32 limit = 4;
}

message DealContextResponse {
  string deal_id = 1;
  string title = 2;
  double value = 3;
  string owner_display_name = 4;
  string stage_name = 5;
  int32 score = 6;
  string contact_display_name = 7;
  string owner_id = 8;
}

message TimelineResponse {
  repeated ActivityItem activities = 1;
}

message ActivityItem {
  string id = 1;
  string type = 2;
  string actor_display_name = 3;
  string content = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

message DealSnapshot {
  double value = 1;
  int32 stage_order = 2;
  int32 days_in_stage = 3;
  int32 activity_count_30d = 4;
  google.protobuf.Timestamp expected_close_date = 5;
  int32 max_stage_order = 6;
  double max_tenant_value = 7;
}
