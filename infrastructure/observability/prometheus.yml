global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: gateway
    static_configs:
      - targets: ["gateway:80"]
    metrics_path: /metrics

  - job_name: deals
    static_configs:
      - targets: ["deals:80"]
    metrics_path: /metrics

  - job_name: scoring
    static_configs:
      - targets: ["scoring:80"]
    metrics_path: /metrics

  - job_name: notifications
    static_configs:
      - targets: ["notifications:80"]
    metrics_path: /metrics

  - job_name: summarization
    static_configs:
      - targets: ["summarization:80"]
    metrics_path: /metrics
